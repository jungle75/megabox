<script src="../../../static/pc/js/jquery-ui.1.12.1.js"></script>

<!-- lib 추가 -->
<script src="../../../static/pc/js/bootstrap-custom.js"></script><!-- selectbox custom -->
<script src="../../../static/pc/js/bootstrap-select.js"></script><!-- selectbox custom -->

<script>
	var _init = {
		cache	: Date.now(),
		path	: '../../../static/pc/js/'
	};
	document.write(
		'<script src="'+_init.path+'ui.common.js?v='+_init.cache+'"><\/script>'+
		'<script src="'+_init.path+'front.js?v='+_init.cache+'"><\/script>'
	);
	
	$(function() {
		//mbLayer.toggle({id:'layer_ex', url:'/html/test/external.html', title:'레이어팝업 수동호출 테스트', minWidth:350 })
		
		// 로딩시 연령고지 레이어 불러오기
		$(window).on('load', function(){
			$modal('layer_age_alert');
		});
	});
</script>
</head>
<body>

	<!-- 웹접근성 영역 바로가기 -->
	<div class="skip" title="스킵 네비게이션">
		<a href="#contents">본문 바로가기</a>
		<a href="#footer">푸터 바로가기</a>
	</div>

	<!-- body-wrap -->
	<div class="body-wrap">
		<!-- header -->
		<header id="header">
			header : layout.html 참조
		</header>
		<!--// header -->

		<!-- container -->
		<div class="container">
			
			<!-- contents -->
			<div id="contents">
				
				<section id="layer_age_alert" class="modal-layer">
					<div class="wrap" style="width:500px;">
						<header class="layer-header">
							<h3 class="tit">접속대기안내</h3>
						</header>
			
						<div class="layer-con">
							
							<!-- connect-waiting -->
							<div class="connect-waiting">
							
								<div class="counting">
									<i class="iconset ico-connect-waiting"></i>
									
									<div class="count">
										<p class="tit">대기인원</p>
										
										<p class="txt">
											<em>230</em>
											<span>명</span>
										</p>
									</div>
								</div>
								
								<div class="box-gray">
									<p class="txt">
										페이지 사용량이 많아 접속이 지연되고 있습니다.<br />
										잠시만 기다려 주세요.
									</p>
									
									<div class="graph-bar">
										<!-- 접근성 : em 안의 숫자도 실시간으로 바꿔줘야 합니다. -->
										<div class="bar" style="width:33.333%">
											<span><em>33.333</em> &#37;</span>
										</div>
									</div>
								</div>
								
								<p class="info">
									※ 새로고침 또는 뒤로가기를 하시면 대기 시간이 다시 부여됩니다.
								</p>
							</div>
							<!--// connect-waiting -->
						</div>
			
						<button type="button" class="btn-modal-close">레이어 닫기</button>
					</div>
				</section>
				
			</div>
			<!--// contents -->
		</div>
		<!--// container -->
		
		<!-- footer -->
		<footer id="footer">
			footer: layout.html 참조
		</footer>
		<!--// footer -->
		
		<!-- 모바일 때만 출력 -->
		<div class="go-mobile">
			<a href="">모바일웹으로 보기 <i class="iconset ico-go-mobile"></i></a>
		</div>
	</div>
	<!--// body-wrap -->
