<body class="bg-member">
	<!-- member-wrap -->
	<div class="member-wrap">
		<h1 class="ci"><a href="">MEGABOX : Life Theater</a></h1>

		<div class="col-wrap">
			<!-- col -->
			<div class="col">
				
				<p class="tit-member">회원 재인증</p>
				
				<div class="tab-list">
					<ul>
						<li class="on"><a href="">간편인증</a></li>
						<li><a href="">본인인증</a></li>
					</ul>
				</div>
				
				<ul class="dot-list gblue mt40">
					<li class="font-gblue">회원정보에 등록된 휴대폰번호로 인증번호가 전송됩니다.</li>
				</ul>
				
				<div class="table-wrap mt15">
					<table class="board-form">
						<caption>아이디, 이름, 휴대폰 번호, 인증번호 항목을 가진 회원 재인증 등록 표</caption>
						<colgroup>
							<col style="width:130px;">
							<col>
						</colgroup>
						<tbody>
							<tr>
								<th scope="row"><label for="user_id">아이디</label></th>
								<td>
									<input type="text" id="user_id" placeholder="아이디" class="input-text w230px">
									
									<div class="alert">오류 메시지</div>
								</td>
							</tr>
							<tr>
								<th scope="row"><label for="user_name">이름</label></th>
								<td>
									<input type="text" id="user_name" placeholder="이름" class="input-text w230px">
								</td>
							</tr>
							<tr>
								<th scope="row"><label for="user_hp">휴대폰 번호</label></th>
								<td>
									<input type="text" id="user_hp" placeholder="'-' 없이 입력" class="input-text w230px">
									<button type="button" class="button gray w75px ml08">인증요청</button>
									
									<div class="alert">오류 메시지</div>
								</td>
							</tr>
							<tr>
								<th scope="row"><label for="user_hp_chk">인증번호</label></th>
								<td>
									<div class="chk-num small">
										<div class="line">
											<input type="text" id="chkNum" class="input-text w180px" title="인증번호 입력" />
										
											<div class="time-limit">
												3:00
											</div>
										</div>
									</div>
									
									<button type="button" class="button gray-line w75px ml08">인증확인</button>
									
									<div class="alert">오류 메시지</div>
								</td>
							</tr>
						</tbody>
					</table>
