	<header id="headerSub" class="bd-no">

	<div id="rnb">
		
	</div>

	
	<div class="container gray">
	
		 <div class="top-tip v1">
			메가박스에서 이용하실 아이디와 비밀번호를 등록해주세요
		</div>

		<div class="form-wrap">
			<div class="inner-wrap">
				<div class="f-line">
					<div class="box date">
						<input type="text" class="input-text" value="홍길동" readonly="readonly" title="회원이름">
						<button type="button" class="w70 purple">중복확인</button>
					</div>
				</div>
				<div class="f-line">
					<div class="box">
						<input type="password" class="input-text" placeholder="비밀번호" title="비밀번호 입력">
					</div>
				</div>
				<div class="f-line">
					<div class="box">
						<input type="password" class="input-text" placeholder="비밀번호 확인" title="비밀번호 확인">
					</div>
				</div>
			</div>
		</div>

		<div class="combo-text-wrap">
			<p class="tit">유의사항</p>
			<ul class="circle-list">
				<li>아이디는 영문 또는 영문+숫자 조합 12자리 이상으로 설정해주세요.</li>
				<li>비밀번호는 영문, 숫자, 특수문자 중 2가지 이상 조합 10자리 이상으로 설정해주세요.</li>
				<li>생년월일, 휴대폰번호 등 개인정보와 관련된 숫자, 연속된 숫자와 같이 쉬운 비밀번호는 사용을 자제해주세요.</li>
				<li>비밀번호는 3개월마다 변경해주세요.</li>
			</ul>
		</div>
		
		<div class="btn-bottom">
			<button type="button" class="button-bot purple">확인</button>
		</div>
