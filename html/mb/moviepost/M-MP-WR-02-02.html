<body>
	<header id="headerSub">
		<h1 class="tit">무비포스트 작성</h1>
		<a href="" class="h-back"><i class="iconset ico-back"></i></a>
	</header>
	<div id="rnb">
	
	</div>

	<div class="container">

		<div class="combo-top-text set-post">
			<p>캡틴마블</p>
			<button type="button" class="btn-set">다시선택</button>
		</div>
		
		<div class="write-post-area">
			<div class="post-default">
				<div class="steel-img">
					<p class="img"><img src="../../../static/mb/images/moviepost/img-mvpost-01.jpg" alt=""></p>
					<button type="button" class="btn-camera"><i class="iconset ico-camera"></i></button>
				</div>

				<div class="txt-write-area">
					<textarea name="" id="" cols="30" rows="1" placeholder="내용을 입력하세요."></textarea>
					<p class="num"><span>0</span>/50</p>
				</div>
			</div>

			<!-- 포스트추가버튼을 눌렀을때 노출되는 영역 : plus-add 클래스 추가-->
			<div class="post-default plus-add">
				<div class="btn-post-del">
					<button type="button">포스트 삭제</button>
				</div>

				<div class="steel-img">
					<p class="img"><span class="text">이미지를 선택하세요.</span></p>
					<button type="button" class="btn-camera"><i class="iconset ico-camera"></i></button>
				</div>

				<div class="txt-write-area">
					<textarea name="" id="" cols="30" rows="10" placeholder="내용을 입력하세요."></textarea>
					<p class="num"><span>0</span>/50</p>
				</div>
			</div>
			<!-- // 포스트추가버튼을 눌렀을때 노출되는 영역 -->

			
			<div class="btn-post-add">
				<button type="button">포스트 추가 <i class="iconset ico-plus"></i></button>
			</div>
		</div>

		<div class="btn-bottom col-2">
			<button type="button" class="button-bot gray">취소</button>
			<button type="button" class="button-bot purple">등록</button>
		</div>
	</div>
