<title>가입완료 &gt; 회원가입 &gt; 로그인 | 라이프시어터 메가박스</title>

<link rel="stylesheet" href="../../../static/mb/css/import.css" media="all" />

<script src="../../../static/mb/js/jquery-1.12.4.js"></script>
<script src="../../../static/mb/js/jquery-ui.1.12.1.js"></script>
<script src="../../../static/mb/js/gsaps.js"></script>
<script>
	var _init = {
		cache	: Date.now(),
		path	: '../../../static/mb/js/'
	};
	document.write(
		'<script src="'+_init.path+'ui.common.js?v='+_init.cache+'"><\/script>'+
		'<script src="'+_init.path+'front.js?v='+_init.cache+'"><\/script>'
	);

<body>
	<div class="login-wrap">

		<div class="login-inner">
			<p class="join-title">가입완료</p>

			<div class="step-area join">
				<div class="step ico-end"><!-- 완료된 스텝에서는 ico-end 클래스 추가 -->
					<span class="num">1</span>
					<span class="txt">본인인증</span>
				</div>
				<div class="step ico-end"><!-- 완료된 스텝에서는 ico-end 클래스 추가 -->
					<span class="num">2</span>
					<span class="txt">약관동의</span>
				</div>
				<div class="step ico-end"><!-- 현재 스텝에서는 ico-end 클래스 추가 -->
					<span class="num">3</span>
					<span class="txt">정보입력</span>
				</div>
				<div class="step ico-ing"><!-- 현재 스텝에서는 ico-ing 클래스 추가 -->
					<span class="num">4</span>
					<span class="txt">가입완료</span>
				</div>
			</div>

			<div class="join-end-area">
				<p class="txt1"><span class="font-purple">홍길동</span>님! 축하합니다.</p>
				<p class="txt1">메가박스 회원가입이 되었습니다.</p>
				<p class="txt2">메가박스에서 다양한 혜택을 누리실 수 있습니다.</p>
			</div>

			<div class="join-image-area">
				<!-- 어드민에서 등록한 이미지가 나오는 영역 -->
			</div>

			<div class="btn-bottom v1">
				<button type="button" class="button dark-purple">홈</button>
				<button type="button" class="button purple">로그인</button>
			</div>
		</div>
	</div>
</body>
</html>
