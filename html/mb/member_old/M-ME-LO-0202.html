		cache	: Date.now(),
		path	: '../../../static/mb/js/'
	};
	document.write(
		'<script src="'+_init.path+'ui.common.js?v='+_init.cache+'"><\/script>'+

<body>
	<div class="login-wrap">
		<div class="a-c"><a href=""><img src="../../../static/pc/images/common/ci/logo.png" alt=""></a></div>

		<div class="login-inner">

			<div class="login-tab"><!-- PC예매 팝업 로그인 (회원/비회원) -->
				<ul>
					<li class="on"><a href="">회원</a></li>
					<li><a href="">비회원</a></li>
				</ul>
			</div>

			
			<div class="a-c">
				<p><b>비밀번호와 자동입력 방지문자를 입력해주세요.</b></p>
				<p>
					비밀번호를 5회 이상 잘못 입력할 경우,<br />
					정보보호를 위해 자동입력 방지문자를 함께 입력해야 합니다.
				</p>
			</div>
			<div class="form-line">
				<label for="user_id">아이디</label>	
				<input type="text" placeholder="아이디를 입력해주세요" id="user_id" class="input-text" />
			</div>

			<div class="form-line">
				<label for="user_pw">비밀번호</label>
				<input type="password" placeholder="비밀번호를 입력해주세요" id="user_pw" class="input-text" />
			</div>

			<div class="anti-auto">
				<p>자동입력 방지문자</p>
				<div class="anti-auto-img">
					<div class="img-area"><img src="" alt=""></div>
					<div class="anti-btn">
						<a href="" class="button">새로고침</a>
						<a href="" class="button">음성으로 듣기</a>				
					</div>
				</div>

				<div class="form-line">
					<label for="antiAuto">자동입력 방지문자</label>
					<input type="text" placeholder="자동입력 방지문자 입력" id="antiAuto" class="input-text" />
				</div>
			</div>

			<div class="login-chk">
				<div class="login-auto">
					<input type="checkbox" id="chk01" /> <label for="chk01">자동 로그인</label>
				</div>
				<div class="login-easy">
					<input type="checkbox" id="chk02" /> <label for="chk02">휴대폰 간편 로그인</label>  <a href="" class="">광고</a>
				</div>
			</div>


			<div class="btn-login">
				<button type="submit" class="button">로그인</button>
				<!-- <button type="button" class="button">로그인</button>  버튼타입 submit,button 둘중 하나 쓰시면됩니다.-->
			</div>

			<div class="login-link-list">
				<ul>
					<li><a href="">ID/PW찾기</a></li>
					<li><a href="">회원가입</a></li>
					<li><a href="">비회원 예매 확인</a></li>
				</ul>
			</div>

			<div class="another-login">
				<p>간편 로그인</p>
				<a href="" class="button login-payco">PAYCO 로그인</a>
				<a href="" class="button login-naver">NAVER 로그인</a>
				<a href="" class="button login-kakao">KAKAO 로그인</a>
				<a href="" class="button login-facebook">FACEBOOK 로그인</a>
			</div>
		</div>

	</div>
