<body>
	<div class="login-wrap">
		<div class="a-c"><a href=""><img src="../../../static/pc/images/common/ci/logo.png" alt=""></a></div>

			<div class="form-line">
				<label for="name">이름</label>
				<input type="text" placeholder="이름을 입력해 주세요" id="name" class="input-text"  />
			</div>

			<div class="form-line">
				<label for="birthday">생년월일</label>

			</div>

			<div class="form-line">
				<label for="cell">휴대폰번호</label>
				<input type="tel" placeholder="'-'없이 입력해 주세요" id="cell" class="input-text" />
			</div>

			<div class="form-line">
				<label for="pw">비밀번호</label>
				<input type="password" placeholder="비밀번호 숫자 4자리 입력해 주세요" id="pw" class="input-text" />
			</div>

			<div class="mt20">
				<ul class="dash-list">
					<li>비회원 정보 오 입력 시 예매 내역 확인/취소 및 티켓 발권이 어려울 수 있으니 다시 한번 확인해주시기 바랍니다</li>
				</ul>
			</div>

			<div class="btn-bottom">

			</div>
		</div>
