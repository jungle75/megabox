<script src="../../../static/mb/js/swiper.min.js"></script>
<script>
$(function(){
	// footer 토글
	$('#footer .arrow').click(function() {
        $('.footerHide').toggleClass('act');
    });
});

$(window).on('scroll', function() {
	var r24_header = $('.r24_header');
    if (r24_header.length > 0) {
        var scrollTop = $(window).scrollTop();
        
        if (scrollTop > 0) {
            r24_header.addClass('scrollon');
        } else {
            r24_header.removeClass('scrollon');
        }
    };
});
</script>

<body>
    
  <header id="headerSub" class="r24_header">
		<div class="headCont">
			<div class="ltArea">
				<a href="#" class="btn2"><i class="icon2 btn_back_bl30">뒤로가기</i></a>
			</div>
			<h2 class="headTite">Apple 계정 로그인 연동</h2>
		</div>
	</header>


  <div class="container">    

    <!-- 회원 로그인 -->
    <div class="login2-wrap mbContent">
        <div class="inner-wrap">

          <div class="appleGuidBox">
            <div class="logos">
              <span class="logo"><img src="../../../static/mb/images/2024renewal/common/icon_apple.png" alt="애플"></span>
              <span class="logo"><img src="../../../static/mb/images/2024renewal/common/icon_megabox.png" alt="메가박스"></span>
            </div>
            <dl>
              <dt>애플 계정 인증 완료</dt>
              <dd>메가박스 아이디로 로그인하여 Apple 계정과 연동해주세요.<br/>최초 연동후 Apple 계정으로 간편 로그인할 수 있습니다.</dd>
            </dl>
          </div>
          
          <form name="loginDataFrm" method="post">
            <div class="f-line">
              <div class="box">
                <input type="text" class="input-text enterTgt" id="loginId" name="loginId" placeholder="아이디" title="아이디를 입력하세요">
              </div>
            </div>
            <div class="f-line">
              <div class="box">
                <input type="password" class="input-text enterTgt" id="loginPwd" name="loginPwd" placeholder="비밀번호" title="비밀번호를 입력하세요">
              </div>
            </div>
          </form>

          <div class="btn-group pb20">
            <button type="button" class="button-bot purple" id="loginBtn">로그인 후 간편 로그인 연동하기</button>
          </div>

          <div class="login-link-list">
            <ul>
              <li><a href="javascript:AppDomain.Member.findIdPwd(AppDomain.Flag.isRefreshClose)">ID/PW 찾기</a></li>
              <li><a href="javascript:AppDomain.Member.join()">회원가입</a></li>
            </ul>
          </div>            
        </div>
        
    </div>
</div>
</body>
