</script>

<body>
	<header id="headerSub" class="r24_header">
		<div class="headCont">
			<h2 class="headTite">실관람평 작성</h2>
			<div class="rtArea">
				<a href="#" class="btn1"><i class="icon2 btn_close_bl30">닫기</i></a>
			</div>
		</div>
	</header>

	
	<div class="container">

    <div class="mv-expect-caution">
      <ul>
        <li>관람일 기준 +7일 이내 관람평 작성 시 50P가 지급됩니다.</li>
        <li>관람평 포인트는 관람평 작성일 기준 매월 1일부터 말일까지, 1개월간 최대 10편까지만 지급됩니다.</li>
      </ul>
    </div>
    
    <div class="mv-expect">
      <p class="tit"><span id="movieName">'청설'</span> 영화 어떠셨나요?</p>
      
      <input type="range" value="5.0" step="0.5" id="star-grade" style="display: none;">
      <div class="rateit view rateit-bg" id="rateit" style="float: left;" data-rateit-backingfld="#star-grade" data-rateit-resetable="false" data-rateit-ispreset="true" data-rateit-min="0" data-rateit-max="5">
        <div class="grade" id="starGrade"><block id="starGradeScore">10</block></div>
        <button id="rateit-reset-2" type="button" data-role="none" class="rateit-reset" aria-label="reset rating" aria-controls="rateit-range-2" style="display: none;">
          <span></span>
        </button>
        <div id="rateit-range-2" class="rateit-range" tabindex="0" role="slider" aria-label="rating" aria-owns="rateit-reset-2" aria-valuemin="0" aria-valuemax="5" aria-valuenow="5" aria-readonly="false" style="width: 150px; height: 30px;">
          <div class="rateit-empty"></div>
          <div class="rateit-selected rateit-preset" style="height: 30px; width: 150px;"></div>
          <!-- <div class="rateit-hover" style="height: 30px; width: 150px;"></div> -->
        </div>
      </div>
  
      <div class="txt-write-area">
          <textarea name="onelnEvalCn" id="onelnEvalCn" cols="30" rows="1" placeholder="실관람평을 남겨주세요." maxlength="100"></textarea>
          <p class="num"><span>0</span>/100</p>
      </div>
    </div>

    <div class="mv-point-area view">
    
      <p class="tit">관람포인트는 무엇인가요? <span>최대 5개 선택가능</span></p>
  
      <div class="check-btn">
          <p class="chk">
              <input type="checkbox" id="dirtor" class="viewPoint">
              <label for="dirtor">연출</label>
          </p>
          <p class="chk">
              <input type="checkbox" id="story" class="viewPoint">
              <label for="story">스토리</label>
          </p>
          <p class="chk">
              <input type="checkbox" id="video" class="viewPoint">
              <label for="video">영상미</label>
          </p>
          <p class="chk">
              <input type="checkbox" id="actor" class="viewPoint">
              <label for="actor">배우</label>
          </p>
          <p class="chk">
              <input type="checkbox" id="ost" class="viewPoint">
              <label for="ost">OST</label>
          </p>
      </div>
  
      <p class="alert-txt"></p>
    </div>

    <div class="btn-bottom">
      <button type="button" id="createRealCommentBtn" class="button-bot purple" onclick=" fn_tmpLayer54921_oneLineReviewRegister()">작성하기</button>
    </div>
	</div>


</body>
