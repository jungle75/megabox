<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <meta property="og:image" content="http://image3.megabox.co.kr/mop/home/appbunpage/URLVIEW.jpg">
  <meta name="”format-detection”" content="”telephone=no," address="no," email="no”">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="expires" content="0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Content-Language" content="ko">
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">

  <meta name="viewport" content="width=device-width,initial-scale=1, maximum-scale=1, user-scalable=no">

  <meta name="keyword"
    content="메가박스,megabox,영화,영화관,극장,티켓,박스오피스,상영예정작,예매,오페라,싱어롱,큐레이션,필름소사이어티,클래식소사이어티,이벤트,Movie,theater,Cinema,film,Megabox" />
  <meta name="description" content="삶의 의미와 즐거움을 소통하는 공간, 함께 더 행복한 가치있는 콘텐츠를 추구하는 만남고 소통의 즐거움이 가득한 공간 메가박스 입니다." />

  <meta property="og:site_name" content="메가박스" />
  <meta property="og:url" content="http://megabox.co.kr" />
  <meta property="og:image" content="http://image2.megabox.co.kr/mop/home/appbunpage/URLVIEW.jpg" />

  <title>모바일티켓당첨 팝업</title>

  <link rel="stylesheet" href="../../../static/mb/css/import.css" media="all" />

  <script src="../../../static/mb/js/jquery-1.12.4.js"></script>
  <script src="../../../static/mb/js/jquery-ui.1.12.1.js"></script>
  <script src="../../../static/mb/js/swiper.min.js"></script>
  <script>
    $(function () {
      // 티켓 360도 회전 기능
      const box = document.querySelector('.bd');

      box.addEventListener('click', () => {
        box.classList.toggle('active'); // active 클래스 추가/제거
      });
    });
  </script>
</head>

<body>
  <div class="container">

    <!-- layerpopup2 -->
    <div class="layerpopup2">

      <div class="dim"></div>
      
      <!-- 공유/닫기 버튼 -->
      <div class="fncBtn">
        <a href="#" class="btn"><i class="icon2 btn_share_wl30">공유</i></a>
        <a href="#" class="btn"><i class="icon2 btn_close_w30">닫기</i></a>
      </div>
      <!--// 공유/닫기 버튼 -->
      
      <div class="layer centerPop">
        <div class="bd">
          <!-- 360도 회전 -->
          <div class="deg360">
            <img src="../../../static/mb/images/2024renewal/ticket/360deg.png" alt="360도 회전" />
          </div>

          <!-- 티켓 앞면 -->
          <article class="ticketCoupon">
            <div class="rotateTicket">
              <ul class="topUtil">
                <li class="logo"><img src="../../../static/mb/images/2024renewal/ticket/color_roll.png" alt="" /></li>
                <li class="number">2024.08.24</li>
              </ul>

              <!-- ticketInfoWrap -->
              <div class="ticketInfoWrap">
                <div class="top">
                  <div class="mvImg"><img src="../../../static/mb/images/2024renewal/@sample_324x166.png" alt=""></div>
                  <p class="mvTitle">인사이트 아웃 2</p>

                  <div class="colorInner age_12"><span>2D MX4D(자막)</span>전체 관람가</div>
                </div>

                <div class="mvMoreInfo">                 
<!-- 2024-11-19 .alignWrap추가 -->
                  <div class="alignWrap">                    
                    <div class="place">
                      <div class="txt">남양주현대아울렛 스페이스원<br>Dolby Cinema</div>
                    </div>

                    <div class="col2">
                      <div class="box">
                        <div class="tit">상영일</div>
                        <div class="inBox">
                        <span class="txt1">00:00</span>
                        <span class="txt2">(월)</span>
                        </div>
                      </div>

                      <div class="box"> 
                        <div class="tit">상영시간</div>
                        <div class="inBox">
                          <span class="txt1">00.00</span>
                          <span class="txt2">~ 10:40</span>
                        </div>
                      </div>
                    </div>

                    <div class="tit"><a href="#">좌석</a></div>

                    <div class="seat onlyText">
                      <p>D23, D24, D25, D26, D27, D28, D29, D23, D24, D25</p>
                    </div>								

                    <div class="viewers">
                      <ul>
                        <li>일반 2</li>
                        <li>청소년 0</li>
                        <li>어린이 0</li>
                        <li>우대 0</li>
                        <li>우대 0</li>
                      </ul> 
                    </div>
                  </div>

                  <div class="logoBox"><img src="../../../static/mb/images/2024renewal/ticket/color_roll2.png" alt="" /></div>
                </div>
                
              </div>
              <!--//ticketInfoWrap end -->              
            </div>
          </article>
          <!--// 티켓 앞면 -->

          <!-- 티켓 뒷면 -->
          <article class="ticketCoupon back">
            <div class="rotateTicket">
              <ul class="topUtil">
                <li class="logo"><img src="../../../static/mb/images/2024renewal/ticket/color_roll.png" alt="" /></li>
                <li class="number">2024.08.24</li>
              </ul>

              <!-- ticketInfoWrap -->
              <div class="ticketInfoWrap">

                <div class="mvMoreInfo">
                  <!-- 포스터 이미지 -->
                  <div class="poster"><img src="../../../static/mb/images/2024renewal/@sample_w72.png" alt="" /></div>
                  <!--// 포스터 이미지 -->
                  
                  <div class="logoBox"><img src="../../../static/mb/images/2024renewal/ticket/color_roll2.png" alt="" /></div>
                </div>
                
              </div>
              <!--//ticketInfoWrap end -->              
            </div>
          </article>
          <!--// 티켓 뒷면 -->

        </div>
      </div>

    </div>
    <!--//layerpopup2 end -->

  </div>


</body>

</html>
