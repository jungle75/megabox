<title> 모바일티켓 &gt; 예매 | 라이프시어터 메가박스</title>

<link rel="stylesheet" href="../../../static/mb/css/import.css" media="all" />

<script src="../../../static/mb/js/jquery-1.12.4.js"></script>
<script src="../../../static/mb/js/jquery-ui.1.12.1.js"></script>
<script src="../../../static/mb/js/gsaps.js"></script>
<script>
	var _init = {
		cache	: Date.now(),
		path	: '../../../static/mb/js/'
	};
	document.write(
		'<script src="'+_init.path+'ui.common.js?v='+_init.cache+'"><\/script>'+
		'<script src="'+_init.path+'front.js?v='+_init.cache+'"><\/script>'
	);
</script>

</head>
<body>
	<div class="movie-ticket">
		<button type="button" class="btn-close"><i class="iconset ico-close-white"></i></button>
		<div class="top-img"><img src="../../../static/mb/images/reserve/img-movie-ticket.png" alt=""></div>

		<div class="inner-wrap">
			<div class="top-util">
				<h1 class="logo"><a href="#"><img src="../../../static/mb/images/common/ci/logo-white.png" alt=""></a></h1>
				<div class="right">
					<a href="#">극장 길찾기</a>
					<a href="#">좌석보기</a>
					<a href="#">예매번호 공유</a>
				</div>
			</div>

			<!-- 
			pg-12 > 12세 이상 관람가
			pg-15 > 15세 이상 관람가
			pg-20 > 청소년 관람불가
			pg-all > 전체관람가
			-->
			<div class="ticket-info-wrap pg-20">
				<div class="top">
					<p class="mv-title">메리 포핀스 리턴즈 포핀스 </p>
				</div>

				<div class="round-box">
					<div class="color-inner">
						<span>디지털</span>
						<span>청소년 관람불가</span>
					</div>
				</div>

				<div class="mv-more-info">
					<div class="date-place">
						<span class="date">2019.03.28 (목)</span>
						<span class="place">하남스타필드 더부티크</span>
					</div>

					<div class="time">
						<span class="start-time roboto light">09:40</span>
						<span class="end-time roboto light">~ 10:40</span>
					</div>

					<div class="viewer">
						<span>일반<em class="num">2명</em></span>
						<span>청소년<em class="num">0명</em></span>
						<span>어린이<em class="num">0명</em></span>
						<span>우대<em class="num">0명</em></span>
					</div>

					<div class="seat">
						<span>E열 01-02</span>
						<span>J열 11-12</span>
					</div>
				</div>

				<div class="dot-line-area">
					<div class="barcode-area on"> <!-- 바코드 넘버 클릭시 on 클래스 활성화 -->
						<button type="button" class="barcode-num">T90320 - 008 - 6251 <i class="iconset ico-more-gray-bt"></i></button>

						<div class="barcode-img">
							<div class="img"><img src="../../../static/mb/images/mymega/img-barcode.png" alt=""></div>
							<p class="alert-text">모바일 티켓으로 현장 발권없이 바로 입장이 가능합니다. </p>
						</div>
					</div>
				</div>
			</div>

			<div class="enter-aelrt">
				<p class="tit">입장 알림</p>
				<p class="text">상영 30분 전 알림으로 입장시간을 알려드립니다.</p>
				<button type="button" class="on"><i class="iconset ico-toggle"></i></button><!-- 선택시 button에 on 클래스 추가 -->
			</div>
		</div>

		
	</div>

	<div class="btn-bottom bnb col-4">
		<button type="button" class="button-bot">
			<i class="iconset ico-bnb-combo"></i><span>모바일 오더</span>
		</button>
		<button type="button" class="button-bot" >
			<i class="iconset ico-bnb-photo"></i>
			포토카드
		</button>
		<button type="button" class="button-bot">
			<i class="iconset ico-bnb-share"></i>
			티켓나누기
		</button>
		<button type="button" class="button-bot">
			<i class="iconset ico-bnb-cancle"></i>
			예매취소
		</button>
	</div>
</body>
