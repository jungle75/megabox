				</div>

				<div class="inner-wrap">
					<div class="f-line card-4type">
						<div class="box">
							<input type="text" class="input-text" readonly="readonly" value="1234" title="첫번째 카드번호 입력">
							<input type="text" class="input-text" readonly="readonly" value="5678" title="두번째 카드번호 입력">
